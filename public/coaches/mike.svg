<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="700" fill="url(#bg)"/>
  <rect width="600" height="700" fill="rgba(0,0,0,0.08)"/>
  <!-- Body silhouette -->
  <ellipse cx="300" cy="780" rx="230" ry="185" fill="url(#body)" opacity="0.9"/>
  <!-- Head -->
  <circle cx="300" cy="268" r="115" fill="#fde8d0"/>
  <!-- Short hair -->
  <ellipse cx="300" cy="185" rx="118" ry="75" fill="#1c1917"/>
  <ellipse cx="300" cy="170" rx="112" ry="60" fill="#292524"/>
  <!-- Ear left -->
  <ellipse cx="185" cy="268" rx="18" ry="22" fill="#fcd9b0"/>
  <!-- Ear right -->
  <ellipse cx="415" cy="268" rx="18" ry="22" fill="#fcd9b0"/>
  <!-- Neck -->
  <rect x="270" y="368" width="60" height="58" rx="10" fill="#fde8d0"/>
  <!-- Eyes -->
  <ellipse cx="268" cy="265" rx="15" ry="17" fill="white"/>
  <ellipse cx="332" cy="265" rx="15" ry="17" fill="white"/>
  <circle cx="270" cy="267" r="9" fill="#1c1917"/>
  <circle cx="334" cy="267" r="9" fill="#1c1917"/>
  <circle cx="273" cy="263" r="3" fill="white"/>
  <circle cx="337" cy="263" r="3" fill="white"/>
  <!-- Eyebrows -->
  <path d="M252 246 Q268 237 284 245" stroke="#1c1917" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M316 245 Q332 237 348 246" stroke="#1c1917" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M296 280 Q292 297 300 302 Q308 297 304 280" stroke="#c9956a" stroke-width="2" fill="none"/>
  <!-- Smile -->
  <path d="M275 322 Q300 342 325 322" stroke="#c9956a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Beard/stubble -->
  <path d="M255 340 Q300 368 345 340" stroke="#a8a29e" stroke-width="1.5" fill="rgba(120,113,108,0.15)" stroke-dasharray="3,2"/>
  <!-- Initials badge -->
  <circle cx="300" cy="600" r="46" fill="rgba(255,255,255,0.2)"/>
  <text x="300" y="612" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">Mi</text>
</svg>
