<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="700" fill="url(#bg)"/>
  <!-- Subtle pattern overlay -->
  <rect width="600" height="700" fill="rgba(0,0,0,0.08)"/>
  <!-- Body silhouette -->
  <ellipse cx="300" cy="780" rx="220" ry="180" fill="url(#body)" opacity="0.9"/>
  <!-- Head -->
  <circle cx="300" cy="270" r="110" fill="#fde8d0"/>
  <!-- Neck -->
  <rect x="268" y="365" width="64" height="60" rx="10" fill="#fde8d0"/>
  <!-- Hair -->
  <ellipse cx="300" cy="195" rx="115" ry="90" fill="#7c3aed"/>
  <ellipse cx="300" cy="170" rx="110" ry="70" fill="#5b21b6"/>
  <!-- Eyes -->
  <ellipse cx="270" cy="265" rx="14" ry="16" fill="white"/>
  <ellipse cx="330" cy="265" rx="14" ry="16" fill="white"/>
  <circle cx="272" cy="267" r="8" fill="#1c1917"/>
  <circle cx="332" cy="267" r="8" fill="#1c1917"/>
  <circle cx="275" cy="263" r="3" fill="white"/>
  <circle cx="335" cy="263" r="3" fill="white"/>
  <!-- Eyebrows -->
  <path d="M255 248 Q270 240 285 248" stroke="#5b21b6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M315 248 Q330 240 345 248" stroke="#5b21b6" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M297 278 Q293 295 300 300 Q307 295 303 278" stroke="#c9956a" stroke-width="2" fill="none"/>
  <!-- Smile -->
  <path d="M278 320 Q300 338 322 320" stroke="#c9956a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Initials badge -->
  <circle cx="300" cy="600" r="46" fill="rgba(255,255,255,0.2)"/>
  <text x="300" y="612" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">ME</text>
</svg>
