<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="700" fill="url(#bg)"/>
  <rect width="600" height="700" fill="rgba(0,0,0,0.08)"/>
  <!-- Body silhouette -->
  <ellipse cx="300" cy="780" rx="225" ry="182" fill="url(#body)" opacity="0.9"/>
  <!-- Head -->
  <circle cx="300" cy="268" r="112" fill="#fde8d0"/>
  <!-- Short dark hair -->
  <ellipse cx="300" cy="183" rx="115" ry="72" fill="#292524"/>
  <ellipse cx="300" cy="168" rx="110" ry="58" fill="#1c1917"/>
  <!-- Ear left -->
  <ellipse cx="188" cy="268" rx="17" ry="21" fill="#fcd9b0"/>
  <!-- Ear right -->
  <ellipse cx="412" cy="268" rx="17" ry="21" fill="#fcd9b0"/>
  <!-- Neck -->
  <rect x="270" y="366" width="60" height="56" rx="10" fill="#fde8d0"/>
  <!-- Eyes -->
  <ellipse cx="268" cy="262" rx="15" ry="16" fill="white"/>
  <ellipse cx="332" cy="262" rx="15" ry="16" fill="white"/>
  <circle cx="270" cy="264" r="9" fill="#1c1917"/>
  <circle cx="334" cy="264" r="9" fill="#1c1917"/>
  <circle cx="273" cy="260" r="3" fill="white"/>
  <circle cx="337" cy="260" r="3" fill="white"/>
  <!-- Eyebrows -->
  <path d="M252 244 Q268 234 285 242" stroke="#1c1917" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M315 242 Q332 234 348 244" stroke="#1c1917" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M296 276 Q291 295 300 300 Q309 295 304 276" stroke="#c9956a" stroke-width="2" fill="none"/>
  <!-- Mouth / slight smirk -->
  <path d="M277 320 Q300 336 323 318" stroke="#c9956a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Initials badge -->
  <circle cx="300" cy="600" r="46" fill="rgba(255,255,255,0.2)"/>
  <text x="300" y="612" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="white">CJ</text>
</svg>
